  <circle cx="960" cy="315" r="380" fill="none" stroke="#F7F3EB" stroke-width="1" opacity="0.04"/>
  <circle cx="960" cy="315" r="280" fill="none" stroke="#F7F3EB" stroke-width="1" opacity="0.03"/>

  <!-- Left border accent -->
  <rect x="80" y="120" width="2" height="390" fill="#7A6040" opacity="0.6"/>

